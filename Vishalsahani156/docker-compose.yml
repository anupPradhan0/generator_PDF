# MERN PDF Generator — local Docker stack
# Run: docker compose up -d --build
# App:  http://localhost:5173   API: http://localhost:5000/health

name: pdf-generator

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval \"db.adminCommand('ping').ok\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    restart: unless-stopped
    init: true
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_HOST_PORT:-5000}:5000"
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/pdf_generator
      JWT_SECRET: ${JWT_SECRET:-change-me-please-use-a-long-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:5000}
      UPLOAD_DIR: uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_PROXY: http://backend:5000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  mongo_data:
  frontend_node_modules:
