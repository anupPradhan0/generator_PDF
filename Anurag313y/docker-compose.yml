# Event Dashboard — Docker Compose (local / staging)
# Quick start:  docker compose up --build
# Production:   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# App:          http://localhost:${APP_PORT:-3000}

name: event-dashboard

services:
  mongo:
    image: mongo:7
    container_name: event-dashboard-mongo
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - internal
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mongosh --quiet --eval "db.adminCommand(''ping'').ok" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s
    logging: &default-logging
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: event-dashboard-api
    restart: unless-stopped
    init: true
    env_file:
      - path: .env
        required: false
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: '5001'
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/invoice_generator}
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret_in_production}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:${APP_PORT:-3000}}
    networks:
      - internal
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:5001/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 50s
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: event-dashboard-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '${APP_PORT:-3000}:8080'
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8080/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging

volumes:
  mongodb_data:

networks:
  internal:
    driver: bridge
